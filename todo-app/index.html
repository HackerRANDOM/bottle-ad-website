<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-tasks"></i> My Tasks</h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>
        <main class="main-content">
            <section class="input-section">
                <div class="input-group">
                    <input type="text" id="todoInput" class="todo-input" placeholder="Add a new task...">
                    <select id="prioritySelect" class="priority-select">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                    <button id="addBtn" class="add-btn"><i class="fas fa-plus"></i> Add</button>
                </div>
                <div class="quick-actions">
                    <button id="clearCompletedBtn" class="action-btn"><i class="fas fa-trash"></i> Clear</button>
                    <button id="exportBtn" class="action-btn"><i class="fas fa-download"></i> Export</button>
                </div>
            </section>
            <section class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
                <button class="filter-btn" data-filter="high">High Priority</button>
            </section>
            <section class="stats-section">
                <div class="stats-row">
                    <div class="stat-item">
                        <span class="stat-label">Total:</span>
                        <span class="stat-value" id="totalCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Completed:</span>
                        <span class="stat-value" id="completedCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Remaining:</span>
                        <span class="stat-value" id="remainingCount">0</span>
                    </div>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            </section>
            <section class="todo-list-section">
                <div id="todoList" class="todo-list"></div>
                <div id="emptyState" class="empty-state show">
                    <i class="fas fa-inbox"></i>
                    <h2>No tasks yet</h2>
                </div>
            </section>
        </main>
        <footer class="footer"><p>Tasks saved automatically to local storage</p></footer>
    </div>
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Task</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <input type="text" id="editInput" class="edit-input">
                <select id="editPriority" class="priority-select">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            <div class="modal-footer">
                <button id="cancelBtn" class="btn-secondary">Cancel</button>
                <button id="saveBtn" class="btn-primary">Save</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
